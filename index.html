let zaehler = 0;

function ziehen() {
    zaehler++;

    let zahl;

    // Jede 9. Ziehung ist die 15
    if (zaehler % 9 === 0) {
        zahl = 15;
    } else {
        // Zufallszahl 1–17, aber ohne 15
        do {
            zahl = Math.floor(Math.random() * 17) + 1;
        } while (zahl === 15);
    }

    document.getElementById("zahl").textContent = zahl;
}
